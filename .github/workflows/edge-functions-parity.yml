# Catch out-of-band edge drift (the #74 / v10 eleven-day gap).
# Runs on every merge to main (no path filter) and on a daily cron.
# Deploy stays in deploy-edge-functions.yml with a path filter.
name: Edge Functions Parity

on:
  push:
    branches: [main]
  schedule:
    # Daily — drift between merges is the failure mode this exists to catch.
    - cron: "17 13 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-edge-functions-parity
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: eigfvribtntbxyjutsma
    steps:
      - name: Require SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set. Create a CI-dedicated Supabase personal access token (do not reuse the laptop CLI token) and add it as the Actions secret."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Compare deployed source bodies to main
        run: node scripts/edge-function-parity.mjs
